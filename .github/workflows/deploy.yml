name: Motekar ERP Deploy to VPS

on:
  push:
    branches:
      - main  # Ganti dengan branch utama Anda jika menggunakan master atau lainnya

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build Validation (Local Checks)
        run: |
          # 1. Validasi build backend
          cd backend
          npm install
          npm run build
          
          # 2. Validasi build frontend
          cd ../frontend
          npm install
          npm run build

      - name: SSH Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Masuk ke folder proyek di VPS
            cd /var/www/motekar-erp

            # Ambil update kode terbaru dari branch main
            git pull origin main

            # Update backend
            cd backend
            npm install --omit=dev
            npm run build

            # Update frontend
            cd ../frontend
            npm install
            npm run build

            # Restart backend di PM2 secara aman (Zero-downtime reload)
            pm2 reload motekar-backend || pm2 restart motekar-backend
            
            echo "🚀 Deployment Selesai & Berhasil!"
