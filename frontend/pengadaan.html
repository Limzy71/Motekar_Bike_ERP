<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Pengadaan - Motekar ERP</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint": "#3755c3", "surface-dim": "#d8dadc", "inverse-primary": "#b8c4ff", "surface": "#f7f9fb",
                        "outline": "#757684", "surface-bright": "#f7f9fb", "tertiary": "#003c36", "tertiary-fixed-dim": "#6bd8cb",
                        "on-primary-fixed": "#001453", "surface-container": "#eceef0", "on-surface": "#191c1e",
                        "surface-container-highest": "#e0e3e5", "outline-variant": "#c4c5d5", "on-primary-container": "#a8b8ff",
                        "on-secondary": "#ffffff", "on-error-container": "#93000a", "error": "#ba1a1a", "on-error": "#ffffff",
                        "inverse-on-surface": "#eff1f3", "on-primary-fixed-variant": "#173bab", "background": "#f7f9fb",
                        "on-surface-variant": "#444653", "on-primary": "#ffffff", "on-secondary-fixed": "#0d1c2f",
                        "primary-container": "#1e40af", "on-tertiary-fixed": "#00201d", "secondary-fixed-dim": "#b9c7e0",
                        "on-tertiary": "#ffffff", "secondary-container": "#d5e3fd", "primary": "#00288e", "surface-container-high": "#e6e8ea",
                        "secondary-fixed": "#d5e3fd", "on-tertiary-container": "#5fcdbf", "on-secondary-fixed-variant": "#3a485c",
                        "on-background": "#191c1e", "primary-fixed": "#dde1ff", "secondary": "#515f74", "primary-fixed-dim": "#b8c4ff",
                        "on-tertiary-fixed-variant": "#005049", "tertiary-container": "#00554e", "tertiary-fixed": "#89f5e7",
                        "surface-container-low": "#f2f4f6", "on-secondary-container": "#57657b", "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e0e3e5", "inverse-surface": "#2d3133", "error-container": "#ffdad6"
                    },
                    spacing: { "sidebar-width": "260px" },
                    fontFamily: {
                        "data-mono": ["JetBrains Mono"], "title-sm": ["Inter"], "headline-md": ["Inter"],
                        "display-lg": ["Inter"], "label-caps": ["Inter"], "body-sm": ["Inter"], "body-md": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-nav {
            background-color: #e8eaf2;
            border-left: 4px solid #00288e;
        }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 60;
            pointer-events: none;
            transform: translateY(24px);
            opacity: 0;
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.28s ease;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast .material-symbols-outlined {
            font-size: 1.2rem;
        }
        button, .btn-action {
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        button, .nav-item, .material-symbols-outlined {
            outline: none;
        }
        button:focus, .nav-item:focus {
            outline: none;
            box-shadow: none;
        }
        button:focus-visible, .nav-item:focus-visible {
            outline: 2px solid rgba(37, 99, 235, 0.22);
            outline-offset: 2px;
            box-shadow: none;
        }
        button::-moz-focus-inner {
            border: 0;
        }
        button:active, .nav-item:active {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>

<body class="text-on-surface">
    <div class="flex h-screen overflow-hidden">

        <!-- ==================== SIDEBAR ==================== -->
        <aside id="sidebar" class="w-sidebar-width bg-surface-container-lowest border-r border-outline-variant flex flex-col justify-between shrink-0 z-20 relative transition-all duration-300">
            <div class="flex flex-col gap-6 p-6 overflow-hidden">
                <div class="flex flex-col gap-1 min-w-[200px]" id="sidebar-logo">
                    <h1 class="text-primary text-xl font-black tracking-tight leading-tight">Motekar Bike Assy</h1>
                    <p class="text-on-surface-variant text-xs font-medium uppercase tracking-widest">Sistem ERP Terpadu</p>
                </div>
                <nav id="sidebar-nav" class="flex flex-col gap-1 mt-4">
                    <!-- Nav items akan di-render oleh rbac.ts -->
                </nav>
            </div>
            <div class="p-6 border-t border-outline-variant">
                <button id="btn-logout" class="flex w-full items-center justify-center gap-2 bg-error text-on-error py-2.5 rounded-lg font-bold text-sm shadow-sm hover:opacity-90 transition-opacity whitespace-nowrap overflow-hidden">
                    <span class="material-symbols-outlined text-[18px] shrink-0">logout</span>
                    <span class="menu-text">Keluar Sistem</span>
                </button>
            </div>
        </aside>

        <!-- ==================== MAIN CONTENT ==================== -->
        <main class="flex-1 flex flex-col overflow-hidden bg-surface relative">
            <!-- HEADER -->
            <header class="h-16 border-b border-outline-variant bg-surface-container-lowest flex items-center justify-between px-6 shrink-0 z-10">
                <div class="flex items-center gap-4">
                    <button id="btn-hamburger" class="p-2 rounded-lg text-on-surface hover:bg-surface-container transition-colors">
                        <span class="material-symbols-outlined text-[24px]">menu</span>
                    </button>
                    <span class="text-headline-md text-on-surface font-bold">Manajemen Pengadaan</span>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity" title="Lihat Profil Saya">
                        <div class="text-right">
                            <p id="header-nama" class="text-sm font-bold leading-none text-on-surface">Nama Pengguna</p>
                            <p id="header-role" class="text-[10px] text-on-surface-variant uppercase font-bold tracking-wider mt-0.5">Jabatan / Role</p>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-primary font-bold shadow-sm">
                            <span id="header-inisial">U</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- SCROLLABLE CONTENT -->
            <div class="flex-1 overflow-y-auto p-8 bg-slate-50/30">

                <div class="flex items-center justify-between mb-6">
                    <div>
                        <h2 class="text-xl font-bold text-slate-900 tracking-tight">Daftar Permintaan Pembelian (PR)</h2>
                        <p class="text-xs text-slate-500 mt-0.5">Monitoring status pengadaan suku cadang aktif</p>
                    </div>
                    <button class="bg-slate-900 hover:bg-slate-800 text-white text-xs font-medium px-3.5 py-2 rounded-lg shadow-xs flex items-center gap-2 transition-all" onclick="window.location.href='buat_pr.html'">
                        <span class="material-symbols-outlined text-[16px]">add</span> Buat PR Baru
                    </button>
                </div>

                <div class="bg-white border border-slate-200/80 rounded-xl shadow-2xs overflow-hidden">
                    <table class="w-full border-collapse table-auto data-table">
                        <colgroup>
                            <col style="width: 20%">
                            <col style="width: 28%">
                            <col style="width: 11%">
                            <col style="width: 16%">
                            <col style="width: 13%">
                            <col style="width: 12%">
                        </colgroup>
                        <thead>
                            <tr class="border-b border-slate-200/80">
                                <th class="bg-slate-50/75 text-[11px] font-bold uppercase tracking-wider text-slate-400 py-3 px-4 text-left">NOMOR PR</th>
                                <th class="bg-slate-50/75 text-[11px] font-bold uppercase tracking-wider text-slate-400 py-3 px-4 text-left">ITEM BARANG</th>
                                <th class="bg-slate-50/75 text-[11px] font-bold uppercase tracking-wider text-slate-400 py-3 px-4 text-left">JUMLAH</th>
                                <th class="bg-slate-50/75 text-[11px] font-bold uppercase tracking-wider text-slate-400 py-3 px-4 text-left">VENDOR</th>
                                <th class="bg-slate-50/75 text-[11px] font-bold uppercase tracking-wider text-slate-400 py-3 px-4 text-left">STATUS</th>
                                <th class="bg-slate-50/75 text-[11px] font-bold uppercase tracking-wider text-slate-400 py-3 px-4 text-center">AKSI</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-outline-variant" id="tbody-pengadaan">
                            <tr>
                                <td colspan="6" class="px-6 py-8 text-center text-sm text-on-surface-variant">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 p-6 opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-md rounded-3xl bg-surface-container-lowest shadow-2xl border border-outline-variant/30 p-6 transform scale-95 transition-transform duration-300" id="confirm-modal-box">
            <div class="flex items-start gap-4">
                <div class="w-12 h-12 bg-error text-on-error rounded-3xl flex items-center justify-center text-2xl shrink-0">
                    <span class="material-symbols-outlined">delete</span>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-on-surface">Konfirmasi Tindakan</h3>
                    <p class="mt-2 text-sm text-on-surface-variant" id="confirm-modal-text">Apakah Anda yakin?</p>
                </div>
            </div>
            <div class="mt-6 flex items-center justify-end gap-3">
                <button id="confirm-no" class="px-4 py-2 rounded-lg border border-outline-variant text-on-surface-variant hover:bg-surface-container transition-colors font-bold text-sm">Batal</button>
                <button id="confirm-yes" class="px-4 py-2 rounded-lg bg-error text-on-error hover:opacity-90 transition-opacity font-bold text-sm shadow-sm">Ya, hapus</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="fixed bottom-6 right-6 z-50 pointer-events-none" id="toast-container">
        <div class="toast bg-inverse-surface text-inverse-on-surface px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 border border-outline-variant/20 min-w-[320px] opacity-0 pointer-events-none transition-opacity duration-300" id="toast">
            <span class="material-symbols-outlined" id="toast-icon">check_circle</span>
            <span class="text-sm font-medium" id="toast-message"></span>
        </div>
    </div>

    <script type="module" src="/src/pages/pengadaan.ts"></script>
</body>

</html>
