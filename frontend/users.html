<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Manajemen Pengguna - Motekar ERP</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint": "#3755c3", "surface-dim": "#d8dadc", "inverse-primary": "#b8c4ff", "surface": "#f7f9fb",
                        "outline": "#757684", "surface-bright": "#f7f9fb", "tertiary": "#003c36", "tertiary-fixed-dim": "#6bd8cb",
                        "on-primary-fixed": "#001453", "surface-container": "#eceef0", "on-surface": "#191c1e",
                        "surface-container-highest": "#e0e3e5", "outline-variant": "#c4c5d5", "on-primary-container": "#a8b8ff",
                        "on-secondary": "#ffffff", "on-error-container": "#93000a", "error": "#ba1a1a", "on-error": "#ffffff",
                        "inverse-on-surface": "#eff1f3", "on-primary-fixed-variant": "#173bab", "background": "#f7f9fb",
                        "on-surface-variant": "#444653", "on-primary": "#ffffff", "on-secondary-fixed": "#0d1c2f",
                        "primary-container": "#1e40af", "on-tertiary-fixed": "#00201d", "secondary-fixed-dim": "#b9c7e0",
                        "on-tertiary": "#ffffff", "secondary-container": "#d5e3fd", "primary": "#00288e", "surface-container-high": "#e6e8ea",
                        "secondary-fixed": "#d5e3fd", "on-tertiary-container": "#5fcdbf", "on-secondary-fixed-variant": "#3a485c",
                        "on-background": "#191c1e", "primary-fixed": "#dde1ff", "secondary": "#515f74", "primary-fixed-dim": "#b8c4ff",
                        "on-tertiary-fixed-variant": "#005049", "tertiary-container": "#00554e", "tertiary-fixed": "#89f5e7",
                        "surface-container-low": "#f2f4f6", "on-secondary-container": "#57657b", "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e0e3e5", "inverse-surface": "#2d3133", "error-container": "#ffdad6"
                    },
                    spacing: { "sidebar-width": "260px" },
                    fontFamily: {
                        "data-mono": ["JetBrains Mono"], "title-sm": ["Inter"], "headline-md": ["Inter"],
                        "display-lg": ["Inter"], "label-caps": ["Inter"], "body-sm": ["Inter"], "body-md": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 60;
            pointer-events: none;
            transform: translateY(24px);
            opacity: 0;
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.28s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    
        .swal2-container {
            backdrop-filter: blur(4px) !important;
            -webkit-backdrop-filter: blur(4px) !important;
            background: rgba(15, 23, 42, 0.4) !important; /* Tailwind slate-900/40 */
        }
        
        .swal2-popup {
            border-radius: 1.5rem !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
        }
    </style>
</head>

<body class="text-on-surface">
    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside id="sidebar"
            class="w-sidebar-width bg-surface-container-lowest border-r border-outline-variant flex flex-col justify-between shrink-0 z-20 relative transition-all duration-300">
            <div class="flex-1 flex flex-col gap-6 p-6 overflow-y-auto overflow-x-hidden">
                <div class="flex flex-col gap-1" id="sidebar-logo">
                    <h1 class="text-primary text-xl font-black tracking-tight leading-tight">Motekar Bike Assy</h1>
                    <p class="text-on-surface-variant text-xs font-medium uppercase tracking-widest">Sistem ERP Terpadu
                    </p>
                </div>
                <nav id="sidebar-nav" class="flex flex-col gap-1 mt-4"></nav>
            </div>
            <div class="p-6 border-t border-outline-variant">
                <button id="btn-logout"
                    class="flex w-full items-center justify-center gap-2 bg-error text-on-error py-2.5 rounded-lg font-bold text-sm shadow-sm hover:opacity-90 transition-opacity whitespace-nowrap overflow-hidden">
                    <span class="material-symbols-outlined text-[18px] shrink-0">logout</span>
                    <span class="menu-text">Keluar Sistem</span>
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col overflow-hidden bg-surface relative">
            <header
                class="h-16 border-b border-outline-variant bg-surface-container-lowest flex items-center justify-between px-6 shrink-0 z-10">
                <div class="flex items-center gap-4">
                    <button id="btn-hamburger"
                        class="p-2 rounded-lg text-on-surface hover:bg-surface-container transition-colors">
                        <span class="material-symbols-outlined text-[24px]">menu</span>
                    </button>
                    <span class="text-headline-md text-on-surface font-bold">Manajemen Pengguna</span>
                </div>
                <div class="flex items-center gap-6">
                    <a href="/profil.html"
                        class="flex items-center gap-3 cursor-pointer select-none block group transition-all">
                        <div class="text-right">
                            <p id="header-nama" class="text-sm font-bold leading-none text-on-surface">Memuat...</p>
                            <p id="header-role"
                                class="text-[10px] text-on-surface-variant uppercase font-bold tracking-wider mt-0.5">-
                            </p>
                        </div>
                        <div id="header-avatar-container"
                            class="w-10 h-10 rounded-full border-2 border-amber-400 bg-slate-800 flex items-center justify-center text-amber-400 font-bold shadow-sm overflow-hidden">
                            <span id="header-inisial">--</span>
                        </div>
                    </a>
                </div>
            </header>

            <!-- CONTENT AREA -->
            <div class="flex-1 overflow-y-auto p-6 @container">
                <div class="max-w-6xl mx-auto space-y-6">

                    <!-- Header -->
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h2 class="text-xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                                <span class="material-symbols-outlined text-primary text-[24px]">manage_accounts</span>
                                Direktori Karyawan
                            </h2>
                            <p class="text-xs text-slate-500 mt-0.5">Kelola hak akses dan peran karyawan dalam sistem.
                            </p>
                        </div>
                        <button id="btn-tambah-user"
                            class="bg-primary hover:bg-primary-container text-white px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm flex items-center gap-2 transition-colors">
                            <span class="material-symbols-outlined text-[18px]">person_add</span> Tambah Pengguna
                        </button>
                    </div>

                    <!-- TABLE & PAGINATION WRAPPER -->
                    <div class="flex flex-col">
                        <!-- Table Container -->
                        <div class="bg-white border border-slate-200/80 rounded-t-xl shadow-2xs overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr
                                        class="bg-slate-50/80 border-b border-slate-200 text-[11px] uppercase tracking-wider text-slate-500 font-bold">
                                        <th class="px-6 py-4">ID</th>
                                        <th class="px-6 py-4">Pengguna</th>
                                        <th class="px-6 py-4">Divisi / Role</th>
                                        <th class="px-6 py-4">Status</th>
                                        <th class="px-6 py-4 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="table-users" class="text-sm divide-y divide-slate-100">
                                    <!-- Rows injected by TS -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Pagination Controls -->
                    <div
                        class="flex items-center justify-between px-6 py-4 bg-white border border-t-0 border-slate-200/80 rounded-b-xl shadow-2xs mb-8">
                        <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest"
                            id="users-pagination-info">Menampilkan 0-0 dari 0 data</p>
                        <div class="flex items-center gap-1.5">
                            <button id="users-btn-prev"
                                class="p-1.5 text-slate-400 hover:text-primary hover:bg-primary/10 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                <span class="material-symbols-outlined text-[20px]">chevron_left</span>
                            </button>
                            <div id="users-pagination-pages" class="flex items-center gap-1">
                                <!-- Page buttons injected via TS -->
                            </div>
                            <button id="users-btn-next"
                                class="p-1.5 text-slate-400 hover:text-primary hover:bg-primary/10 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                <span class="material-symbols-outlined text-[20px]">chevron_right</span>
                            </button>
                        </div>
                    </div>
                    </div> <!-- End TABLE & PAGINATION WRAPPER -->
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL EDIT/ADD USER -->
    <div id="modal-user"
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex items-center justify-between p-6 border-b border-slate-100">
                <h3 id="modal-title" class="text-lg font-bold text-slate-900 tracking-tight">Form Pengguna</h3>
                <button id="btn-close-modal" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <div class="p-6 overflow-y-auto">
                <form id="form-user" class="space-y-4">
                    <input type="hidden" id="input-id">

                    <div>
                        <label
                            class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">Username</label>
                        <input type="text" id="input-username"
                            class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                            required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">Nama
                            Lengkap</label>
                        <input type="text" id="input-nama"
                            class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                            required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">Email</label>
                        <input type="email" id="input-email"
                            class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">Divisi /
                            Role</label>
                        <select id="select-role"
                            class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                            required>
                            <option value="General Manager">General Manager</option>
                            <option value="IT Support">IT Support</option>
                            <option value="Pengadaan">Pengadaan</option>
                            <option value="Gudang">Gudang</option>
                            <option value="Operasi Inti">Operasi Inti</option>
                            <option value="Kendali Mutu">Kendali Mutu</option>
                            <option value="Keuangan & Akuntansi">Keuangan & Akuntansi</option>
                            <option value="Pemasaran & Penjualan">Pemasaran & Penjualan</option>
                            <option value="Legal & Kepatuhan">Legal & Kepatuhan</option>
                            <option value="Owner">Owner</option>
                        </select>
                    </div>

                    <div id="container-status" class="hidden">
                        <label
                            class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">Status</label>
                        <select id="select-status"
                            class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                            <option value="Aktif">Aktif</option>
                            <option value="Nonaktif">Nonaktif</option>
                        </select>
                    </div>

                    <div class="pt-4 border-t border-slate-100 flex gap-3">
                        <button type="button" id="btn-cancel-modal"
                            class="flex-1 py-2.5 bg-slate-100 text-slate-600 rounded-xl font-bold text-sm hover:bg-slate-200 transition-colors">Batal</button>
                        <button type="submit" id="btn-submit-modal"
                            class="flex-1 py-2.5 bg-primary text-white rounded-xl font-bold text-sm shadow-sm hover:bg-primary-container transition-all">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    {{> toast }}

    <script type="module" src="/src/pages/users.ts"></script>
</body>

</html>
